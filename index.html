<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易师 - 易经学习工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .module-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .module-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .module-card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.8em;
        }

        .module-card p {
            color: #666;
            line-height: 1.6;
        }

        .practice-area {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none;
        }

        .practice-area.active {
            display: block;
        }

        .back-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 1em;
        }

        .back-btn:hover {
            background: #5568d3;
        }

        .gua-image {
            text-align: center;
            margin: 30px 0;
        }

        .gua-symbol {
            font-size: 8em;
            color: #333;
            margin: 20px 0;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px auto;
            max-width: 800px;
        }

        .option-btn {
            background: #f0f0f0;
            border: 2px solid #ddd;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s;
        }

        .option-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option-btn.correct {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .option-btn.wrong {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .bagua-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px auto;
            max-width: 800px;
        }

        .bagua-btn {
            background: #f0f0f0;
            border: 2px solid #ddd;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.5em;
            transition: all 0.3s;
            text-align: center;
        }

        .bagua-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .bagua-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .result-area {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            border-radius: 10px;
            font-size: 1.3em;
        }

        .result-area.correct {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .result-area.wrong {
            background: #ffebee;
            color: #c62828;
        }

        .next-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2em;
            margin-top: 20px;
        }

        .next-btn:hover {
            background: #45a049;
        }

        .progress-info {
            text-align: center;
            margin: 20px 0;
            font-size: 1.2em;
            color: #667eea;
        }

        .gua-name-display {
            text-align: center;
            font-size: 2em;
            margin: 20px 0;
            color: #333;
        }

        .selected-bagua {
            text-align: center;
            margin: 20px 0;
            font-size: 1.5em;
        }

        .yaoci-section {
            margin: 30px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .yaoci-option {
            background: #f0f0f0;
            border: 2px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .yaoci-option:hover {
            background: #667eea;
            color: white;
        }

        .score-display {
            text-align: center;
            font-size: 1.5em;
            color: #667eea;
            margin: 20px auto;
            max-width: 800px;
        }

        /* 变爻样式 */
        .yaoci-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.3s;
        }

        .yaoci-item:hover {
            background: #f5f5f5;
            transform: translateX(5px);
        }

        .yaoci-item.changed {
            border-left-color: #f44336;
            background: #ffebee;
        }

        .yaoci-item .yaoci-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .yaoci-item .yaoci-content {
            color: #666;
            line-height: 1.6;
        }

        /* 卦象符号样式 - 支持变爻高亮 */
        .gua-symbol-container {
            display: inline-block;
            text-align: center;
            font-size: 2em;
            line-height: 1.5;
        }

        .gua-yao {
            display: block;
            height: 1.5em;
            margin: 0.2em 0;
            transition: all 0.3s;
        }

        .gua-yao.yang {
            color: #333;
        }

        .gua-yao.yang.changed {
            color: #f44336;
        }

        .gua-yao.yin {
            color: #333;
        }

        .gua-yao.yin.changed {
            color: #f44336;
        }

        .change-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-size: 0.9em;
        }

        .change-btn:hover {
            background: #45a049;
        }

        /* 六爻起卦铜钱样式 */
        .ly-coin {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700 0%, #ffb700 100%);
            border: 3px solid #daa520;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .ly-coin.rolling {
            animation: roll 0.2s infinite;
        }

        @keyframes roll {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.1); }
            50% { transform: rotate(180deg) scale(1); }
            75% { transform: rotate(270deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .ly-coin.yang {
            background: linear-gradient(135deg, #ffd700 0%, #ffb700 100%);
        }

        .ly-coin.yin {
            background: linear-gradient(135deg, #c0c0c0 0%, #a0a0a0 100%);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            header h1 {
                font-size: 2em;
            }

            header p {
                font-size: 1em;
            }

            .module-grid {
                grid-template-columns: 1fr;
            }

            .module-card {
                padding: 20px;
            }

            .practice-area {
                padding: 20px;
            }

            .gua-symbol {
                font-size: 5em;
            }

            .bagua-options {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }

            .bagua-btn {
                padding: 15px 10px;
                font-size: 1.2em;
            }

            .bagua-btn div:first-child {
                font-size: 1.8em;
            }

            .bagua-btn div:last-child {
                font-size: 0.6em;
                margin-top: 3px;
            }

            .options-grid {
                grid-template-columns: 1fr;
            }

            .option-btn {
                padding: 12px 20px;
                font-size: 1em;
            }

            .gua-name-display {
                font-size: 1.5em;
            }

            .result-area {
                font-size: 1.1em;
            }

            .next-btn {
                padding: 12px 30px;
                font-size: 1.1em;
            }

            .back-btn {
                padding: 8px 16px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>☯ 易师 ☯</h1>
            <p>易经学习与练习工具</p>
        </header>

        <!-- 首页模块选择 -->
        <div id="homeModule" class="module-grid">
            <div class="module-card" onclick="showModule('liuyao')">
                <h2>🪙 六爻起卦</h2>
                <p>传统金钱起卦法，投掷六次铜钱得卦</p>
            </div>
            <div class="module-card" onclick="showModule('guaxiang')">
                <h2>📊 卦象练习</h2>
                <p>随机显示卦象图，从三个选项中选择正确的卦名</p>
            </div>
            <div class="module-card" onclick="showModule('guaming')">
                <h2>📝 卦名记忆</h2>
                <p>根据部分卦名，选择正确的八卦组成</p>
            </div>
            <div class="module-card" onclick="showModule('yaoci')">
                <h2>📖 爻辞卦辞练习</h2>
                <p>选择正确的卦辞和爻辞，深入学习经文</p>
            </div>
            <div class="module-card" onclick="showModule('chaxun')">
                <h2>📚 六十四卦查询</h2>
                <p>自由选择八卦组成六十四卦，查看卦象、卦辞、爻辞及变卦</p>
            </div>
        </div>

        <!-- 卦象练习模块 -->
        <div id="guaxiangModule" class="practice-area">
            <button class="back-btn" onclick="showHome()">← 返回首页</button>
            <h2 style="text-align: center; margin-bottom: 20px;">卦象练习</h2>
            <div class="progress-info" id="gxProgress"></div>
            <div class="gua-image">
                <div class="gua-symbol" id="gxSymbol"></div>
            </div>
            <div class="options-grid" id="gxOptions"></div>
            <div id="gxResult"></div>
            <button class="next-btn" onclick="nextGuaXiang()" style="display: none;" id="gxNextBtn">下一题</button>
        </div>

        <!-- 卦名记忆模块 -->
        <div id="guamingModule" class="practice-area">
            <button class="back-btn" onclick="showHome()">← 返回首页</button>
            <h2 style="text-align: center; margin-bottom: 20px;">卦名记忆</h2>
            <div class="progress-info" id="gmProgress"></div>
            <div class="gua-name-display" id="gmGuaName"></div>
            <div class="selected-bagua" id="gmSelected"></div>
            <div class="bagua-options" id="gmBaguaOptions"></div>
            <div id="gmResult"></div>
            <button class="next-btn" onclick="nextGuaMing()" style="display: none;" id="gmNextBtn">下一题</button>
        </div>

        <!-- 爻辞卦辞练习模块 -->
        <div id="yaociModule" class="practice-area">
            <button class="back-btn" onclick="showHome()">← 返回首页</button>
            <h2 style="text-align: center; margin-bottom: 20px;">爻辞卦辞练习</h2>
            <div class="score-display" id="ycScore"></div>
            <div class="gua-image">
                <div class="gua-symbol" id="ycSymbol"></div>
            </div>
            <div class="gua-name-display" id="ycGuaName"></div>
            <div class="yaoci-section" id="ycQuestion"></div>
            <div id="ycResult"></div>
            <button class="next-btn" onclick="nextYaoCiModule()" style="display: none;" id="ycNextBtn">继续</button>
        </div>

        <!-- 六爻起卦模块 -->
        <div id="liuyaoModule" class="practice-area">
            <button class="back-btn" onclick="showHome()">← 返回首页</button>
            <h2 style="text-align: center; margin-bottom: 20px;">六爻起卦</h2>
            
            <!-- 起卦按钮 -->
            <div id="lyStartDiv" style="text-align: center; margin: 30px 0;">
                <button class="next-btn" onclick="startLiuYao()">开始起卦</button>
            </div>
            
            <!-- 铜钱投掷区域 -->
            <div id="lyTossArea" style="display: none;">
                <div class="progress-info" id="lyProgress">第 1 爻</div>
                
                <!-- 铜钱动画容器 -->
                <div style="display: flex; justify-content: center; gap: 30px; margin: 30px 0;">
                    <div class="ly-coin" id="lyCoin1"></div>
                    <div class="ly-coin" id="lyCoin2"></div>
                    <div class="ly-coin" id="lyCoin3"></div>
                </div>
                
                <div id="lyResult" style="text-align: center; font-size: 1.5em; margin: 20px 0;"></div>
                
                <div style="text-align: center; margin-top: 20px;">
                    <button class="option-btn" onclick="tossCoins()" id="lyTossBtn">投掷铜钱</button>
                </div>
            </div>
            
            <!-- 卦象显示区域 -->
            <div id="lyGuaDiv" style="display: none;">
                <div class="gua-image">
                    <div class="gua-symbol" id="lySymbol"></div>
                </div>
                <div class="gua-name-display" id="lyGuaName"></div>
                <div style="text-align: center; margin: 20px 0;">
                    <button class="next-btn" onclick="showLiuYaoDetail()">查看详情</button>
                    <button class="next-btn" onclick="resetLiuYao()" style="margin-left: 10px;">重新起卦</button>
                </div>
            </div>
        </div>

        <!-- 六十四卦查询模块 -->
        <div id="chaxunModule" class="practice-area">
            <button class="back-btn" onclick="showHome()">← 返回首页</button>
            <h2 style="text-align: center; margin-bottom: 20px;">六十四卦查询</h2>
            
            <!-- 八卦选择区域 -->
            <div id="cxBaguaSelect">
                <h3 style="text-align: center; margin-bottom: 15px;">选择上卦</h3>
                <div class="bagua-options" id="cxUpperBagua"></div>
                
                <h3 style="text-align: center; margin: 20px 0 15px;">选择下卦</h3>
                <div class="bagua-options" id="cxLowerBagua"></div>
            </div>
            
            <!-- 卦象详情区域 -->
            <div id="cxGuaDetail" style="display: none;">
                <div style="margin-bottom: 15px;">
                    <button class="back-btn" onclick="backToBaguaSelect()">← 返回首页</button>
                    <button class="back-btn" onclick="backToRootGua()" id="cxBackToRootBtn" style="display: none; margin-left: 10px;">← 返回本卦</button>
                </div>
                
                <div class="gua-image">
                    <div class="gua-symbol" id="cxSymbol"></div>
                </div>
                <div class="gua-name-display" id="cxGuaName"></div>
                
                <!-- 互卦、综卦、错卦 -->
                <div style="text-align: center; margin: 20px 0;">
                    <button class="option-btn" id="cxHuguaBtn" onclick="jumpToGua('hugua')">互卦</button>
                    <button class="option-btn" id="cxZongguaBtn" onclick="jumpToGua('zonggua')">综卦</button>
                    <button class="option-btn" id="cxCuoguaBtn" onclick="jumpToGua('cuogua')">错卦</button>
                </div>
                
                <!-- 卦辞 -->
                <div style="background: #f9f9f9; padding: 20px; border-radius: 10px; margin: 20px 0;">
                    <h3 style="color: #667eea; margin-bottom: 10px;">卦辞</h3>
                    <p id="cxTuanshi" style="font-size: 1.2em; line-height: 1.8;"></p>
                </div>
                
                <!-- 爻辞 -->
                <div style="background: #f9f9f9; padding: 20px; border-radius: 10px; margin: 20px 0;">
                    <h3 style="color: #667eea; margin-bottom: 15px;">爻辞（点击爻可标记变爻）</h3>
                    <div id="cxYaociList"></div>
                </div>
                
                <!-- 变卦按钮 -->
                <div id="cvChangeGuaDiv" style="text-align: center; display: none;">
                    <button class="next-btn" onclick="jumpToBianGua()">查看变卦</button>
                </div>
            </div>
            
            <div id="cxResult"></div>
        </div>
    </div>

    <script src="yizhou-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
